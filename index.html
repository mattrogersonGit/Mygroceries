<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Trolley — grocery price compare</title>
<meta name="theme-color" content="#12151a" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --bg: #12151a;
    --panel: #1a1e26;
    --panel-2: #20252f;
    --border: #2a3040;
    --text: #e7eaf0;
    --muted: #8b93a3;
    --accent: #ffb454;      /* price-tag amber */
    --good: #4fd48a;        /* savings green */
    --bad: #ff6b6b;
    --chain-paknsave: #ffb454;
    --chain-newworld: #e2483d;
    --chain-woolworths: #2e8b57;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  header{
    padding:18px 20px 14px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  header h1{ font-size:18px; margin:0; letter-spacing:.2px; }
  header h1 .tag{ color:var(--accent); font-family:var(--mono); }
  #who{ font-size:13px; color:var(--muted); }
  main{ max-width:720px; margin:0 auto; padding:16px; padding-bottom:80px; }
  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:16px; margin-bottom:14px;
  }
  .card h2{ font-size:14px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:0 0 12px; }
  input, select, button{
    font:inherit; color:var(--text); background:var(--panel-2);
    border:1px solid var(--border); border-radius:8px; padding:10px 12px;
  }
  input, select{ width:100%; }
  button{
    cursor:pointer; background:var(--accent); color:#1a1206; border:none;
    font-weight:600; transition:opacity .15s;
  }
  button:hover{ opacity:.88; }
  button.ghost{ background:transparent; color:var(--text); border:1px solid var(--border); font-weight:500; }
  button.small{ padding:6px 10px; font-size:13px; }
  .row{ display:flex; gap:8px; }
  .row > *{ flex:1; }
  .stores-grid{ display:grid; grid-template-columns:1fr; gap:10px; }
  .store-row{ display:flex; align-items:center; gap:10px; }
  .store-row label{ width:96px; font-weight:600; font-size:13px; flex:none; }
  .store-row select{ flex:1; }
  .store-row .store-pick-value{ flex:1; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .store-row .store-pick-clear{ flex:none; padding:4px 8px; }
  .store-row .default-toggle{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); white-space:nowrap; flex:none; }
  #findStoresError{ color:var(--bad); font-size:12px; min-height:14px; margin:2px 0 8px; }
  #storeMap{ height:280px; border-radius:8px; border:1px solid var(--border); margin-bottom:10px; background:var(--panel-2); }
  .leaflet-popup-content-wrapper, .leaflet-popup-tip{ background:var(--panel-2); color:var(--text); }
  .leaflet-popup-content button{ margin-top:6px; }
  .leaflet-container{ background:var(--panel-2); }
  .leaflet-control-attribution{ background:rgba(18,21,26,.7) !important; color:var(--muted) !important; }
  .leaflet-control-attribution a{ color:var(--muted) !important; }
  .store-marker{ display:block; width:14px; height:14px; border-radius:50%; border:2px solid var(--bg); box-shadow:0 0 0 1px rgba(0,0,0,.4); }
  .store-marker-paknsave{ background:var(--chain-paknsave); }
  .store-marker-newworld{ background:var(--chain-newworld); }
  .store-marker-woolworths{ background:var(--chain-woolworths); }
  .store-legend{ display:flex; gap:14px; font-size:12px; color:var(--muted); margin:8px 0 4px; }
  .store-legend .dot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; vertical-align:middle; }
  .store-results{ max-height:220px; overflow-y:auto; border:1px solid var(--border); border-radius:8px; margin:10px 0; }
  .store-results-group h3{ font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); padding:8px 12px 4px; margin:0; }
  .store-result-item{ padding:8px 12px; font-size:13px; cursor:pointer; border-top:1px solid var(--border); }
  .store-result-item:hover{ background:var(--panel-2); }
  .store-result-item.selected{ background:var(--panel-2); border-left:3px solid var(--accent); }
  .store-result-item .addr{ display:block; color:var(--muted); font-size:11px; }
  .no-data-note{ color:var(--muted); font-size:11px; font-style:italic; }
  #addItemForm{ display:flex; gap:8px; margin-bottom:14px; }
  .item{
    border-bottom:1px solid var(--border); padding:12px 0;
  }
  .item:last-child{ border-bottom:none; }
  .item-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .item-label{ font-weight:600; }
  .item-label input[type=checkbox]{ margin-right:8px; }
  .item-actions button{ background:transparent; color:var(--muted); border:none; font-size:16px; padding:2px 6px; }
  .price-table{ display:grid; grid-template-columns:1fr auto auto; gap:4px 12px; margin-top:8px; font-family:var(--mono); font-size:13px; }
  .price-table .chain{ color:var(--muted); }
  .price-table .price{ text-align:right; }
  .price-table .delta.good{ color:var(--good); }
  .price-table .delta.bad{ color:var(--bad); }
  .price-table .delta.neutral{ color:var(--muted); }
  .default-badge{
    font-size:10px; text-transform:uppercase; letter-spacing:.05em;
    color:var(--muted); border:1px solid var(--border); border-radius:4px; padding:1px 5px;
  }
  .empty{ color:var(--muted); font-size:13px; text-align:center; padding:20px 0; }
  #savingsBanner{
    display:none; background:var(--panel-2); border:1px solid var(--good);
    border-radius:10px; padding:12px 14px; margin-bottom:14px;
    font-family:var(--mono); font-size:14px; color:var(--good);
  }
  .hidden{ display:none !important; }
  #authScreen{ max-width:340px; margin:60px auto; padding:0 16px; }
  #authScreen h1{ text-align:center; margin-bottom:20px; }
  #authScreen .card{ padding:20px; }
  #authScreen input{ margin-bottom:10px; }
  #authError{ color:var(--bad); font-size:13px; margin-top:8px; min-height:16px; }
  .muted{ color:var(--muted); font-size:12px; }
</style>
</head>
<body>

<div id="authScreen">
  <h1><span class="tag">$</span> Trolley</h1>
  <div class="card">
    <input id="authEmail" type="email" placeholder="Email" autocomplete="email" />
    <input id="authPassword" type="password" placeholder="Password" autocomplete="current-password" />
    <div class="row">
      <button id="signInBtn">Sign in</button>
      <button id="signUpBtn" class="ghost">Sign up</button>
    </div>
    <div id="authError"></div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <h1><span class="tag">$</span> Trolley</h1>
    <div id="who"></div>
  </header>

  <main>
    <section id="setupCard" class="card">
      <h2>Your stores</h2>
      <div class="row" id="storeFinderControls">
        <input id="postcodeInput" placeholder="Postcode or suburb, e.g. 1023 or Royal Oak" />
        <select id="radiusSelect">
          <option value="5">5 km</option>
          <option value="10" selected>10 km</option>
          <option value="20">20 km</option>
          <option value="50">50 km</option>
        </select>
        <button id="findStoresBtn" type="button">Find stores</button>
      </div>
      <p id="findStoresError"></p>
      <div id="storeMap"></div>
      <div class="store-legend">
        <span><i class="dot" style="background:var(--chain-paknsave)"></i>Pak'nSave</span>
        <span><i class="dot" style="background:var(--chain-newworld)"></i>New World</span>
        <span><i class="dot" style="background:var(--chain-woolworths)"></i>Woolworths</span>
      </div>
      <div id="storeResultsList" class="store-results hidden"></div>
      <div class="stores-grid" id="storePicksGrid"></div>
      <p class="muted" id="setupHint">Search a postcode above, pick your local store per chain from the map or list, and mark one as your default. Prices are compared against your default.</p>
      <button id="saveStoresBtn" class="small">Save stores</button>
    </section>

    <div id="savingsBanner"></div>

    <section class="card">
      <h2>Shopping list</h2>
      <form id="addItemForm">
        <input id="newItemLabel" placeholder="e.g. 2L milk, any brand" />
        <button type="submit">Add</button>
      </form>
      <div id="itemsList"></div>
      <p class="empty hidden" id="emptyState">Your list is empty. Add something above.</p>
    </section>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="stores-data.js"></script>
<script>
// ---------------------------------------------------------------------------
// Config — fill these in with your Supabase project's values
// ---------------------------------------------------------------------------
const SUPABASE_URL = 'https://estnbdcpplwzmpqacnze.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzdG5iZGNwcGx3em1wcWFjbnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5OTI3ODEsImV4cCI6MjA5OTU2ODc4MX0.ie3xHyt6zfdqd7BhLPlHvCnc73NNX6dr_zkwZlsVXns';
const CHAINS = [
  { key: 'paknsave',   label: "Pak'nSave" },
  { key: 'newworld',   label: 'New World' },
  { key: 'woolworths', label: 'Woolworths' },
];

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let session = null;
let profile = null;
let householdStores = []; // [{chain, store_id, store_label, is_default}]
let listItems = [];
let latestPrices = {}; // category_key -> [{chain, name, price}]

// Store picker state
let pendingSelection = {}; // chain -> {chain, id, name, address, lat, lng} | null
let pendingDefaultChain = null;
let leafletMap = null;
let markersLayer = null;
let lastResultsById = {}; // id -> store, for the currently rendered search results

// ---------------------------------------------------------------------------
// Auth
// ---------------------------------------------------------------------------
document.getElementById('signInBtn').onclick = () => authAction('signInWithPassword');
document.getElementById('signUpBtn').onclick = () => authAction('signUp');

async function authAction(method) {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Enter an email and password.'; return; }

  const { data, error } = await sb.auth[method]({ email, password });
  if (error) { errEl.textContent = error.message; return; }
  if (method === 'signUp' && !data.session) {
    errEl.textContent = 'Check your email to confirm your account, then sign in.';
    return;
  }
  await onSignedIn(data.session);
}

sb.auth.onAuthStateChange((_event, s) => {
  if (s) onSignedIn(s); else showAuthScreen();
});

async function onSignedIn(s) {
  session = s;
  const { data: p } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
  profile = p;
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('who').textContent = profile?.display_name ?? session.user.email;
  initMap(); // must run while #app is visible - Leaflet needs a real container size
  await loadStores();
  await loadItems();
}

function showAuthScreen() {
  document.getElementById('app').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
}

// ---------------------------------------------------------------------------
// Store setup
// ---------------------------------------------------------------------------
async function loadStores() {
  const { data } = await sb.from('household_stores').select('*').eq('household_id', profile.household_id);
  householdStores = data ?? [];

  // Seed the in-progress picker state from what's already saved. If a saved
  // store_id isn't in the current STORES dataset (e.g. it was regenerated),
  // fall back to a stub built from the saved label so we don't lose the
  // selection - it just can't be re-centered on the map until re-picked.
  pendingSelection = {};
  householdStores.forEach((s) => {
    const match = STORES.find((st) => st.id === s.store_id && st.chain === s.chain);
    pendingSelection[s.chain] = match ?? { chain: s.chain, id: s.store_id, name: s.store_label, address: '', lat: null, lng: null };
  });
  pendingDefaultChain = householdStores.find((s) => s.is_default)?.chain ?? null;

  renderStorePicks();
}

function chainLabel(key) {
  return CHAINS.find((c) => c.key === key)?.label ?? key;
}

function haversineDistanceKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = ((lat2 - lat1) * Math.PI) / 180;
  const dLng = ((lng2 - lng1) * Math.PI) / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function radiusToZoom(km) {
  if (km <= 5) return 12;
  if (km <= 10) return 11;
  if (km <= 20) return 10;
  return 9;
}

function initMap() {
  if (leafletMap) return;
  leafletMap = L.map('storeMap').setView([-41.2, 174.8], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 18,
  }).addTo(leafletMap);
  markersLayer = L.layerGroup().addTo(leafletMap);
}

async function geocodePostcode(query) {
  // Try a structured postcode lookup first (most precise when it's a real
  // numeric postcode) - but NZ postcode coverage in OSM/Nominatim is patchy,
  // so fall back to a free-text place search (suburb/town names are far more
  // reliably indexed). Free-text results are filtered to place_rank <= 21 to
  // reject low-relevance street/POI matches (e.g. a random bus stop) that
  // happen to share the query digits.
  const postcodeRes = await fetch(
    `https://nominatim.openstreetmap.org/search?postalcode=${encodeURIComponent(query)}&country=New%20Zealand&format=json&limit=1`,
  );
  const postcodeData = await postcodeRes.json();
  if (postcodeData && postcodeData.length) {
    return { lat: parseFloat(postcodeData[0].lat), lng: parseFloat(postcodeData[0].lon) };
  }

  const placeRes = await fetch(
    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ', New Zealand')}&format=json&limit=1&countrycodes=nz`,
  );
  const placeData = await placeRes.json();
  const match = placeData?.find((r) => r.place_rank <= 21);
  if (match) return { lat: parseFloat(match.lat), lng: parseFloat(match.lon) };

  return null;
}

document.getElementById('findStoresBtn').onclick = async () => {
  const btn = document.getElementById('findStoresBtn');
  const errEl = document.getElementById('findStoresError');
  errEl.textContent = '';
  const postcode = document.getElementById('postcodeInput').value.trim();
  if (!postcode) { errEl.textContent = 'Enter a postcode or suburb first.'; return; }
  const radiusKm = parseFloat(document.getElementById('radiusSelect').value);

  btn.disabled = true;
  const originalText = btn.textContent;
  btn.textContent = 'Searching…';
  try {
    const center = await geocodePostcode(postcode);
    if (!center) { errEl.textContent = "Couldn't find that - try a nearby suburb or town name instead."; return; }

    initMap();
    leafletMap.setView([center.lat, center.lng], radiusToZoom(radiusKm));

    const inRange = STORES
      .filter((s) => s.lat != null && s.lng != null)
      .map((s) => ({ ...s, distanceKm: haversineDistanceKm(center.lat, center.lng, s.lat, s.lng) }))
      .filter((s) => s.distanceKm <= radiusKm)
      .sort((a, b) => a.distanceKm - b.distanceKm);

    if (inRange.length === 0) {
      errEl.textContent = 'No stores found in range - try a larger radius.';
    }
    renderStoreMarkers(inRange);
    renderStoreResultsList(inRange);
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
};

function makeDivIcon(chain) {
  return L.divIcon({ className: '', html: `<span class="store-marker store-marker-${chain}"></span>`, iconSize: [14, 14] });
}

function renderStoreMarkers(stores) {
  markersLayer.clearLayers();
  lastResultsById = {};
  stores.forEach((s) => {
    lastResultsById[s.id] = s;
    const marker = L.marker([s.lat, s.lng], { icon: makeDivIcon(s.chain) }).addTo(markersLayer);
    marker.bindPopup(
      `<strong>${s.name}</strong><br>${s.address}<br><button type="button" class="small popup-select-btn" data-id="${s.id}">Select as my ${chainLabel(s.chain)} store</button>`,
    );
  });
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.popup-select-btn');
  if (btn && lastResultsById[btn.dataset.id]) selectStore(lastResultsById[btn.dataset.id]);
});

function renderStoreResultsList(stores) {
  const listEl = document.getElementById('storeResultsList');
  listEl.classList.toggle('hidden', stores.length === 0);
  listEl.innerHTML = '';
  CHAINS.forEach(({ key, label }) => {
    const chainStores = stores.filter((s) => s.chain === key);
    if (chainStores.length === 0) return;
    const group = document.createElement('div');
    group.className = 'store-results-group';
    group.innerHTML = `<h3>${label}</h3>`;
    chainStores.forEach((s) => {
      const item = document.createElement('div');
      item.className = 'store-result-item' + (pendingSelection[key]?.id === s.id ? ' selected' : '');
      item.innerHTML = `${s.name} <span class="muted">(${s.distanceKm.toFixed(1)} km)</span><span class="addr">${s.address}</span>`;
      item.onclick = () => selectStore(s);
      group.appendChild(item);
    });
    listEl.appendChild(group);
  });
}

function selectStore(store) {
  pendingSelection[store.chain] = store;
  renderStorePicks();
  const resultsById = lastResultsById;
  if (Object.keys(resultsById).length) {
    renderStoreResultsList(Object.values(resultsById).sort((a, b) => a.distanceKm - b.distanceKm));
  }
}

function renderStorePicks() {
  const grid = document.getElementById('storePicksGrid');
  grid.innerHTML = '';
  CHAINS.forEach(({ key, label }) => {
    const picked = pendingSelection[key];
    const hasData = STORES.some((s) => s.chain === key);
    const row = document.createElement('div');
    row.className = 'store-row';
    row.innerHTML = `
      <label>${label}</label>
      <span class="store-pick-value">${
        picked
          ? `${picked.name}${picked.address ? ` <span class="muted">— ${picked.address}</span>` : ''}`
          : `<span class="muted">Not selected</span>${!hasData ? ' <span class="no-data-note">(no store data yet)</span>' : ''}`
      }</span>
      ${picked ? `<button type="button" class="store-pick-clear small ghost" data-chain="${key}">✕</button>` : ''}
      <span class="default-toggle">
        <input type="radio" name="defaultChain" value="${key}" ${pendingDefaultChain === key ? 'checked' : ''} />
        default
      </span>
    `;
    grid.appendChild(row);
  });
  grid.querySelectorAll('.store-pick-clear').forEach((btn) => {
    btn.onclick = () => { pendingSelection[btn.dataset.chain] = null; renderStorePicks(); };
  });
  grid.querySelectorAll('input[name=defaultChain]').forEach((r) => {
    r.onchange = (e) => { pendingDefaultChain = e.target.value; };
  });
}

document.getElementById('saveStoresBtn').onclick = async () => {
  for (const { key: chain } of CHAINS) {
    const store = pendingSelection[chain];
    if (!store) continue;
    await sb.from('household_stores').upsert(
      {
        household_id: profile.household_id,
        chain,
        store_id: store.id,
        store_label: store.name,
        is_default: chain === pendingDefaultChain,
      },
      { onConflict: 'household_id,chain' },
    );
  }
  await loadStores();
  await renderItems(); // refresh comparisons now stores changed
};

// ---------------------------------------------------------------------------
// Shopping list
// ---------------------------------------------------------------------------
document.getElementById('addItemForm').onsubmit = async (e) => {
  e.preventDefault();
  const input = document.getElementById('newItemLabel');
  const label = input.value.trim();
  if (!label) return;
  // Simple default: treat the typed label as a free-text category key too.
  // (Swap in a proper "pick specific product per chain" flow later if wanted.)
  const category_key = label.toLowerCase().replace(/\s+/g, '-');
  await sb.from('list_items').insert({
    household_id: profile.household_id,
    label,
    match_type: 'category',
    category_key,
    created_by: profile.id,
  });
  input.value = '';
  await loadItems();
};

async function loadItems() {
  const { data } = await sb
    .from('list_items')
    .select('*')
    .eq('household_id', profile.household_id)
    .order('created_at', { ascending: true });
  listItems = data ?? [];
  await fetchPricesForItems();
  renderItems();
}

async function fetchPricesForItems() {
  latestPrices = {};
  const keys = [...new Set(listItems.map((i) => i.category_key).filter(Boolean))];
  if (keys.length === 0) return;
  const { data } = await sb
    .from('products')
    .select('chain, store_id, name, price, category_key')
    .in('category_key', keys);
  (data ?? []).forEach((p) => {
    // Only keep prices from stores this household actually selected
    const selected = householdStores.find((s) => s.chain === p.chain && s.store_id === p.store_id);
    if (!selected) return;
    latestPrices[p.category_key] ??= [];
    // Keep cheapest per chain
    const existing = latestPrices[p.category_key].find((x) => x.chain === p.chain);
    if (!existing || p.price < existing.price) {
      latestPrices[p.category_key] = latestPrices[p.category_key].filter((x) => x.chain !== p.chain);
      latestPrices[p.category_key].push({ chain: p.chain, name: p.name, price: p.price });
    }
  });
}

function renderItems() {
  const list = document.getElementById('itemsList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '';
  empty.classList.toggle('hidden', listItems.length > 0);

  const defaultChain = householdStores.find((s) => s.is_default)?.chain;
  let totalDefault = 0, totalBest = 0, havePrices = false;

  listItems.forEach((item) => {
    const div = document.createElement('div');
    div.className = 'item';
    const prices = latestPrices[item.category_key] ?? [];
    const defaultPrice = prices.find((p) => p.chain === defaultChain)?.price;

    let tableHtml = '<div class="empty">No price data yet — run the price refresh job.</div>';
    if (prices.length > 0) {
      tableHtml = '<div class="price-table">';
      CHAINS.forEach(({ key, label }) => {
        const p = prices.find((x) => x.chain === key);
        if (!p) return;
        let deltaHtml = '<span class="delta neutral">—</span>';
        if (defaultPrice != null && key !== defaultChain) {
          const diff = defaultPrice - p.price;
          if (Math.abs(diff) > 0.005) {
            deltaHtml = `<span class="delta ${diff > 0 ? 'good' : 'bad'}">${diff > 0 ? '−' : '+'}$${Math.abs(diff).toFixed(2)}</span>`;
          }
        }
        tableHtml += `
          <span class="chain">${label}${key === defaultChain ? ' <span class="default-badge">default</span>' : ''}</span>
          <span class="price">$${p.price.toFixed(2)}</span>
          ${deltaHtml}
        `;
        if (!item.checked) {
          if (key === defaultChain) totalDefault += p.price;
          havePrices = true;
        }
      });
      tableHtml += '</div>';

      if (!item.checked && defaultPrice != null) {
        const cheapest = Math.min(...prices.map((p) => p.price));
        totalBest += cheapest;
      } else if (!item.checked) {
        totalBest += defaultPrice ?? 0;
      }
    }

    div.innerHTML = `
      <div class="item-top">
        <span class="item-label">
          <input type="checkbox" ${item.checked ? 'checked' : ''} data-id="${item.id}" class="item-check" />
          ${item.label}
        </span>
        <span class="item-actions"><button data-id="${item.id}" class="item-delete">✕</button></span>
      </div>
      ${tableHtml}
    `;
    list.appendChild(div);
  });

  document.querySelectorAll('.item-check').forEach((cb) => {
    cb.onchange = async (e) => {
      await sb.from('list_items').update({ checked: e.target.checked }).eq('id', e.target.dataset.id);
      await loadItems();
    };
  });
  document.querySelectorAll('.item-delete').forEach((btn) => {
    btn.onclick = async (e) => {
      await sb.from('list_items').delete().eq('id', e.target.dataset.id);
      await loadItems();
    };
  });

  const banner = document.getElementById('savingsBanner');
  if (havePrices && totalDefault > totalBest + 0.01) {
    banner.style.display = 'block';
    banner.textContent = `Splitting this list across stores saves $${(totalDefault - totalBest).toFixed(2)} vs. buying it all at your default store.`;
  } else {
    banner.style.display = 'none';
  }
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
sb.auth.getSession().then(({ data }) => {
  if (data.session) onSignedIn(data.session); else showAuthScreen();
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
</body>
</html>
